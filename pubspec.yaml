name: jit_connect
description: JIT Connect - Jahangirabad Institute of Technology Attendance & Timetable App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.0.1

  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Notifications & Audio
  flutter_local_notifications: 17.1.2
  audioplayers: ^5.2.1
  timezone: ^0.9.2

  # Utilities
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
