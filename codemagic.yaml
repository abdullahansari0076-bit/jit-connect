workflows:
  android-release:
    name: JIT Connect Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Show repository structure
        script: |
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== CHECKING LIB ==="
          ls -la lib/ || echo "lib folder not found"
          echo "=== CHECKING ANDROID ==="
          ls -la android/ || echo "android folder not found"

      - name: Fix lib folder structure
        script: |
          # If main.dart is in root instead of lib/
          if [ -f "main.dart" ] && [ ! -f "lib/main.dart" ]; then
            echo "Moving dart files to lib folder..."
            mkdir -p lib
            mv main.dart lib/
          fi

          # If lib contents are in root with path prefixes
          for file in core data presentation; do
            if [ -d "$file" ] && [ ! -d "lib/$file" ]; then
              echo "Moving $file to lib/$file"
              mkdir -p lib
              mv $file lib/
            fi
          done

          echo "=== LIB FOLDER AFTER FIX ==="
          ls -la lib/
          ls -la lib/core/ || true
          ls -la lib/data/ || true
          ls -la lib/presentation/ || true

      - name: Get Flutter packages
        script: flutter pub get

      - name: Place google-services.json
        script: |
          cp google-services.json android/app/google-services.json || true
          echo "google-services.json placed"

      - name: Create missing asset folders and files
        script: |
          mkdir -p assets/images
          mkdir -p assets/icons
          mkdir -p assets/sounds
          if [ ! -f assets/sounds/class_bell.mp3 ]; then
            touch assets/sounds/class_bell.mp3
          fi

      - name: Verify main.dart exists
        script: |
          if [ -f "lib/main.dart" ]; then
            echo "✅ lib/main.dart found!"
          else
            echo "❌ lib/main.dart NOT found - listing all dart files:"
            find . -name "*.dart" | head -30
          fi

      - name: Build release APK
        script: |
          flutter build apk \
            --release \
            --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - abdullahansari0076@gmail.com
        notify:
          success: true
          failure: true
