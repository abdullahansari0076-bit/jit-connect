workflows:
  android-release:
    name: JIT Connect Android APK
    max_build_duration: 60
    environment:
      flutter: 3.22.0 # Locked version to prevent unexpected build breaks
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
        ignore_failure: false

      - name: Generate App Icons
        script: dart run flutter_launcher_icons
        ignore_failure: false

      - name: Place google-services.json
        script: cp google-services.json android/app/google-services.json
        ignore_failure: false

      - name: Create asset files
        script: |
          mkdir -p assets/sounds assets/images assets/icons
          touch assets/sounds/class_bell.mp3
        ignore_failure: false

      - name: Build release APK
        script: |
          set -e
          flutter build apk --release --no-tree-shake-icons
        ignore_failure: false

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - abdullahansari0076@gmail.com
        notify:
          success: true
          failure: true
