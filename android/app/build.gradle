plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace "com.jit.jitconnect"
    compileSdkVersion 36 
    ndkVersion "27.0.12077973"

    compileOptions {
        coreLibraryDesugaringEnabled true 
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.jit.jitconnect"
        minSdkVersion 21
        targetSdkVersion 36
        
        // BUMPED: Incremented to 2 to force Android devices to recognize this as a fresh update
        versionCode 2
        versionName "1.0.1"
        
        multiDexEnabled true
    }

    buildTypes {
        release {
            // FIXED: Explicitly forces the build to sign itself with a standard config 
            // so it can be installed by clicking the file on your device.
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.3" 
    implementation "androidx.multidex:multidex:2.0.1"
}
